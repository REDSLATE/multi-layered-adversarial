[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests
filterwarnings =
    ignore::PendingDeprecationWarning
markers =
    tripwire: locked-behavior tests that pin the council/auto-router/diagnose contracts. Run with `pytest -m tripwire` before merging any edit to shared/council.py, shared/auto_router.py, or shared/execution.py.
